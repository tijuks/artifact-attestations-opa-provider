{{- if .Values.provider.tls.updateCABundle }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-manager
rules:
  - apiGroups:
      - externaldata.gatekeeper.sh
    resources:
      - providers
    verbs:
      - get
      - list
      - patch
      - update
      - watch
{{- end }}
