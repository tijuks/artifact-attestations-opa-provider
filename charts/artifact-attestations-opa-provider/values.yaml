# Number of replicas - recommended minimum 2 for production
replicaCount: 2

# PodDisruptionBudget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

certDir: /certs
serviceAccount: opa-provider-sa
port: 8090
trustDomain: dotcom
imagePullSecrets: aa-login-secret
provider:
  timeout: 5
  tls:
    # Only one of useCertManager or caBundle must be set.
    useCertManager: false
    # Enable this to regularly update the Provider's `caBundle` field with the ca.crt from the mounted certificate.
    # This is the equivalent of cert-manager's `inject-ca-from` annotation, which doesn't support Provider objects.
    updateCABundle: false
    caBundle: ""
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 2
    memory: 768Mi